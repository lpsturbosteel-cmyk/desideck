<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desi Deck - 13 Card Rummy</title>
    <style>
        :root {
            --bg-teal: #061a1b;
            --surface-teal: #0d2d2f;
            --accent-gold: #d97706;
            --accent-saffron: #f59e0b;
            --card-white: #ffffff;
            --text-light: #f3f4f6;
            --suit-red: #dc2626;
            --suit-black: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-teal);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 5px 0;
            border-bottom: 1px solid rgba(217, 119, 6, 0.2);
        }

        header h1 {
            color: var(--accent-saffron);
            font-size: 1.4rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .status-banner {
            background: rgba(255, 255, 255, 0.05);
            text-align: center;
            padding: 6px;
            font-size: 0.85rem;
            border-radius: 6px;
            margin: 8px 0;
            color: var(--accent-saffron);
            font-weight: bold;
        }

        /* Opponent Area */
        .ai-area {
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 8px;
        }
        .ai-card-count {
            font-size: 0.8rem;
            color: #9ca3af;
        }

        /* Play Mat (Center Board) */
        .play-mat {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin: 20px 0;
        }

        .pile-container {
            text-align: center;
        }
        .pile-label {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        /* Playing Card Aesthetics */
        .game-card {
            width: 65px;
            height: 95px;
            background-color: var(--card-white);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 6px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            position: relative;
            cursor: pointer;
            transition: transform 0.2s ease, border 0.2s ease;
        }

        .game-card.red { color: var(--suit-red); }
        .game-card.black { color: var(--suit-black); }

        .card-corner {
            font-size: 1.1rem;
            font-weight: bold;
            line-height: 1;
        }
        .card-suit-center {
            font-size: 1.8rem;
            align-self: center;
            line-height: 1;
        }

        /* Specialized Piles */
        .card-back {
            background: linear-gradient(135deg, #b45309, #78350f);
            border: 2px solid var(--accent-saffron);
            color: var(--accent-saffron);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .empty-pile {
            border: 2px dashed rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #4b5563;
        }

        /* Player Control Panel */
        .controls-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .btn {
            background: var(--surface-teal);
            color: var(--text-light);
            border: 1px solid var(--accent-gold);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            max-width: 130px;
            text-align: center;
        }
        .btn-action {
            background: linear-gradient(135deg, var(--accent-saffron), var(--accent-gold));
            color: #000;
            border: none;
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Player Hand Grid Container */
        .player-hand-container {
            background: var(--surface-teal);
            padding: 12px 6px;
            border-radius: 12px 12px 0 0;
            border-top: 2px solid var(--accent-gold);
        }

        .hand-scroll-wrapper {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 4px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* Target state when player taps a card to select it */
        .player-hand-container .game-card.selected {
            transform: translateY(-15px);
            border: 3px solid var(--accent-saffron);
            box-shadow: 0 10px 15px rgba(245, 158, 11, 0.4);
        }
    </style>
</head>
<body>

    <header>
        <h1>Desi Deck Rummy</h1>
    </header>

    <div class="status-banner" id="game-status">Game Loading...</div>

    <!-- Opponent Area -->
    <div class="ai-area">
        <div class="ai-card-count">Opponent Bot: <span id="ai-count">13</span> Cards (Hidden)</div>
    </div>

    <!-- Center Board Mat -->
    <div class="play-mat">
        <div class="pile-container">
            <div class="pile-label">Stock Pile</div>
            <div class="game-card card-back" id="stock-pile" onclick="handleDraw('stock')">🎴</div>
        </div>
        <div class="pile-container">
            <div class="pile-label">Discard</div>
            <div id="discard-zone">
                <!-- Injected via JavaScript dynamically -->
            </div>
        </div>
    </div>

    <!-- Mid Panel Control Dashboard -->
    <div class="controls-row">
        <button class="btn" id="btn-sort" onclick="sortHand()">Auto Sort</button>
        <button class="btn btn-action" id="btn-discard" onclick="executeDiscard()" disabled>Discard Selected</button>
        <button class="btn" id="btn-declare" onclick="executeDeclare()">Declare Hand</button>
    </div>

    <!-- Player Interaction Sandbox -->
    <div class="player-hand-container">
        <div class="pile-label" style="text-align: center; margin-bottom: 4px;">Your 13-Card Hand (Tap card to select)</div>
        <div class="hand-scroll-wrapper" id="player-hand-display">
            <!-- Dynamic Injection Slot -->
        </div>
    </div>

    <script>
        const SUITS = [
            { icon: '♠', label: 'S', color: 'black' },
            { icon: '♥', label: 'H', color: 'red' },
            { icon: '♦', label: 'D', color: 'red' },
            { icon: '♣', label: 'C', color: 'black' }
        ];
        const RANKS = [
            { name: '2', val: 2 }, { name: '3', val: 3 }, { name: '4', val: 4 },
            { name: '5', val: 5 }, { name: '6', val: 6 }, { name: '7', val: 7 },
            { name: '8', val: 8 }, { name: '9', val: 9 }, { name: '10', val: 10 },
            { name: 'J', val: 11 }, { name: 'Q', val: 12 }, { name: 'K', val: 13 }, { name: 'A', val: 14 }
        ];

        let deck = [];
        let playerHand = [];
        let aiHand = [];
        let discardPile = [];
        
        // Game State Engine Loops: 'DRAW', 'DISCARD', 'AI_TURN'
        let currentTurnState = 'DRAW'; 
        let selectedPlayerCardIndex = null;

        function buildDeck() {
            deck = [];
            for (let suit of SUITS) {
                for (let rank of RANKS) {
                    deck.push({
                        suitIcon: suit.icon,
                        suitColor: suit.color,
                        rankName: rank.name,
                        rankValue: rank.val
                    });
                }
            }
        }

        function shuffleDeck() {
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
        }

        function initGame() {
            buildDeck();
            shuffleDeck();

            // Deal 13 structural cards to both entities
            playerHand = [];
            aiHand = [];
            for(let i = 0; i < 13; i++) {
                playerHand.push(deck.pop());
                aiHand.push(deck.pop());
            }

            // Flip top card to launch the Discard Pile
            discardPile = [deck.pop()];
            
            currentTurnState = 'DRAW';
            selectedPlayerCardIndex = null;
            
            updateStatusText("Your Turn: Draw a card from Stock or Discard pile.");
            renderBoard();
        }

        function renderBoard() {
            // 1. Render Discard Pile Layer
            const discardZone = document.getElementById("discard-zone");
            if(discardPile.length > 0) {
                const topCard = discardPile[discardPile.length - 1];
                discardZone.innerHTML = `
                    <div class="game-card ${topCard.suitColor}" onclick="handleDraw('discard')">
                        <div class="card-corner">${topCard.rankName}</div>
                        <div class="card-suit-center">${topCard.suitIcon}</div>
                    </div>
                `;
            } else {
                discardZone.innerHTML = `<div class="game-card empty-pile">Empty</div>`;
            }

            // 2. Render Player Hand Elements
            const handDisplay = document.getElementById("player-hand-display");
            handDisplay.innerHTML = "";
            
            playerHand.forEach((card, index) => {
                const cardDiv = document.createElement("div");
                cardDiv.className = `game-card ${card.suitColor}`;
                if(selectedPlayerCardIndex === index) {
                    cardDiv.classList.add("selected");
                }
                
                cardDiv.innerHTML = `
                    <div class="card-corner">${card.rankName}</div>
                    <div class="card-suit-center">${card.suitIcon}</div>
                `;
                
                cardDiv.onclick = () => selectHandCard(index);
                handDisplay.appendChild(cardDiv);
            });

            // 3. Update Text and Button Systems
            document.getElementById("ai-count").innerText = aiHand.length;
            
            const discardBtn = document.getElementById("btn-discard");
            if(currentTurnState === 'DISCARD' && selectedPlayerCardIndex !== null) {
                discardBtn.disabled = false;
            } else {
                discardBtn.disabled = true;
            }
        }

        function handleDraw(source) {
            if (currentTurnState !== 'DRAW') return;

            if (source === 'stock') {
                if (deck.length === 0) {
                    // Reshuffle discard stack if main run runs dry
                    const top = discardPile.pop();
                    deck = [...discardPile];
                    shuffleDeck();
                    discardPile = [top];
                }
                playerHand.push(deck.pop());
            } else if (source === 'discard') {
                if (discardPile.length === 0) return;
                playerHand.push(discardPile.pop());
            }

            currentTurnState = 'DISCARD';
            updateStatusText("Card drawn successfully! Select a card from your hand and click Discard.");
            renderBoard();
        }

        function selectHandCard(index) {
            selectedPlayerCardIndex = (selectedPlayerCardIndex === index) ? null : index;
            renderBoard();
        }

        function executeDiscard() {
            if (currentTurnState !== 'DISCARD' || selectedPlayerCardIndex === null) return;

            // Strip from player layout arrays and push inside discard array stack
            const discardedCard = playerHand.splice(selectedPlayerCardIndex, 1)[0];
            discardPile.push(discardedCard);
            
            selectedPlayerCardIndex = null;
            currentTurnState = 'AI_TURN';
            
            updateStatusText("Opponent is thinking and calculating...");
            renderBoard();

            // Fire automated simulation response cycle
            setTimeout(triggerAiTurn, 1400);
        }

        function triggerAiTurn() {
            // Simple automated loop tracking engine values
            // Bot draws from stock pile
            if(deck.length > 0) {
                aiHand.push(deck.pop());
            }

            // Bot evaluates hand layout superficially and discards a random object
            const randomIdx = Math.floor(Math.random() * aiHand.length);
            const aiDiscard = aiHand.splice(randomIdx, 1)[0];
            discardPile.push(aiDiscard);

            currentTurnState = 'DRAW';
            updateStatusText("Your Turn: Draw a card.");
            renderBoard();
        }

        function sortHand() {
            // Group sequences systematically via programmatic ranking systems
            playerHand.sort((a, b) => {
                if (a.suitIcon !== b.suitIcon) {
                    return a.suitIcon.localeString().localeCompare(b.suitIcon.localeString());
                }
                return a.rankValue - b.rankValue;
            });
            selectedPlayerCardIndex = null;
            renderBoard();
        }

        function executeDeclare() {
            // Simple validation layout for offline evaluation architectures
            alert("Hand Declaration Submitted! In Rummy, your hand must form valid sequences and sets to win. Organize your groupings and challenge the bot.");
        }

        function updateStatusText(msg) {
            document.getElementById("game-status").innerText = msg;
        }

        // Auto initialization call on execution
        initGame();
    </script>
</body>
</html>
